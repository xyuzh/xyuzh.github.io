<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="dark" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Newsreader:opsz@6..72&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#1b2028; --card:#15181f; --ink:#ece9e3; --muted:#8b94a3; --faint:#6c7682;
    --line:#242a33; --line-strong:#333b47;
    --rl:#e2935c; --rl-tint:rgba(226,147,92,.16); --rl-edge:rgba(226,147,92,.42);
    --lm:#7ea6f7; --lm-tint:rgba(126,166,247,.16); --lm-edge:rgba(126,166,247,.42);
    --pos:#5fc77f; --neg:#e8736a;
    --serif:"Newsreader",Georgia,"Times New Roman",serif;
    --disp:"Fraunces",Georgia,serif;
    --mono:"IBM Plex Mono",ui-monospace,Menlo,Consolas,monospace;
    --rad:14px;
  }
  *{box-sizing:border-box}
  html{color-scheme:dark}
  html,body{margin:0;background:#0f1216}
  body{font-family:var(--serif);color:var(--ink);-webkit-font-smoothing:antialiased;padding:2px}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @keyframes chipPulse{0%{transform:scale(.7);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}

  .widget{border:1px solid var(--line-strong);border-radius:var(--rad);background:var(--card);overflow:hidden}
  .widget-head{padding:16px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;background:#1a1f27}
  .widget-title{font-family:var(--mono);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .widget-title b{color:var(--ink)}
  .widget-body{padding:22px}
  button.btn{font-family:var(--mono);font-size:13px;font-weight:500;letter-spacing:.02em;padding:8px 15px;border-radius:9px;border:1px solid var(--line-strong);background:var(--paper);color:var(--ink);cursor:pointer;transition:all .14s}
  button.btn:hover{border-color:var(--ink);transform:translateY(-1px)}
  button.btn:disabled{opacity:.35;cursor:not-allowed;transform:none}

  /* rung tabs */
  .rungs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
  .rung{font-family:var(--mono);font-size:12px;letter-spacing:.03em;padding:10px 8px;border-radius:10px;border:1px solid var(--line-strong);background:var(--paper);color:var(--muted);cursor:pointer;text-align:left;transition:all .15s;line-height:1.45}
  .rung .no{display:block;font-size:10px;letter-spacing:.14em;color:var(--faint);text-transform:uppercase;margin-bottom:2px}
  .rung:hover{border-color:var(--ink)}
  .rung.on{background:var(--rl-tint);border-color:var(--rl-edge);color:var(--ink)}
  .rung.on .no{color:var(--rl)}

  /* pipeline */
  .pipe{display:grid;grid-template-columns:160px 1fr;gap:16px;align-items:stretch}
  .source{border:1px dashed var(--lm-edge);background:var(--lm-tint);border-radius:10px;padding:14px;display:flex;flex-direction:column;justify-content:center;gap:6px;animation:rise .35s ease both}
  .source .h{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--lm)}
  .source .who{font-family:var(--disp);font-size:17px;line-height:1.3}
  .source .sub{font-family:var(--mono);font-size:11px;color:var(--muted);line-height:1.5}
  .docs{display:flex;flex-direction:column;gap:9px;min-height:200px}
  .doc{border:1px solid var(--line-strong);background:var(--paper);border-radius:10px;padding:10px 13px;display:flex;align-items:center;gap:12px;animation:rise .35s ease both}
  .doc.dropped{opacity:.38}
  .doc.dropped .txt{text-decoration:line-through;text-decoration-color:var(--neg)}
  .doc .txt{flex:1;font-size:14.5px;line-height:1.5;color:#cdd6e5;min-width:0}
  .doc .txt .src{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:2px}
  .doc .txt code{font-family:var(--mono);font-size:.92em;color:var(--ink)}
  .doc .grade{font-family:var(--mono);font-size:12px;white-space:nowrap}
  .doc .grade.ok{color:var(--pos)} .doc .grade.no{color:var(--neg)}
  .wchip{font-family:var(--mono);font-size:13px;font-weight:600;padding:6px 11px;border-radius:8px;white-space:nowrap;animation:chipPulse .4s ease both}
  .wchip.flat{background:rgba(139,148,163,.14);color:var(--muted);border:1px solid var(--line-strong)}
  .wchip.pos{background:rgba(95,199,127,.13);color:var(--pos);border:1px solid rgba(95,199,127,.35)}
  .wchip.neg{background:rgba(232,115,106,.13);color:var(--neg);border:1px solid rgba(232,115,106,.35)}
  .wchip.zero{background:transparent;color:var(--faint);border:1px dashed var(--line-strong)}

  /* formula */
  .formula{margin-top:20px;border:1px solid var(--line);border-radius:10px;background:var(--paper);padding:15px 16px;font-family:var(--mono);font-size:14.5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center}
  .formula .fixed{color:var(--muted)}
  .formula .pi{color:var(--lm)}
  .formula .slot{font-weight:600;padding:4px 10px;border-radius:8px;animation:chipPulse .4s ease both}
  .formula .slot.flat{background:rgba(139,148,163,.14);color:var(--ink);border:1px solid var(--line-strong)}
  .formula .slot.signed{background:var(--rl-tint);color:var(--rl);border:1px solid var(--rl-edge)}
  .formula-cap{font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--faint);text-align:center;margin-top:8px}

  .delta{margin-top:14px;font-size:14.5px;font-style:italic;color:var(--muted);line-height:1.55;min-height:2.8em}
  .delta b{color:var(--rl);font-style:normal}

  @media (max-width:640px){
    .rungs{grid-template-columns:repeat(2,1fr)}
    .pipe{grid-template-columns:1fr}
    .source{flex-direction:row;align-items:center;flex-wrap:wrap}
  }
  @media (prefers-reduced-motion:reduce){ *{animation-duration:.001s !important} }
</style>
</head>
<body>

<div class="widget" id="ladder">
  <div class="widget-head">
    <div class="widget-title">Demo 1 · one loss, <b>four data sources</b></div>
    <button class="btn" id="rerollBtn" title="Draw new samples from the model">↻ Re-sample</button>
  </div>
  <div class="widget-body">
    <div class="rungs" id="rungs"></div>
    <div class="pipe">
      <div class="source" id="source"></div>
      <div class="docs" id="docs"></div>
    </div>
    <div class="formula" id="formula"></div>
    <div class="formula-cap">the update — identical on every rung; only the highlighted weight changes</div>
    <div class="delta" id="delta"></div>
  </div>
</div>

<script>
(function(){
  "use strict";

  // A pool of sampled answers to "What is 17 × 24?" (correct answer: 408).
  var GOOD = [
    '17×24 = 17×20 + 17×4 = 340 + 68 = <code>408</code>',
    '24×17 = 24×(16+1) = 384 + 24 = <code>408</code>',
    'Round up: 17×25 = 425, minus 17 → <code>408</code>'
  ];
  var BAD = [
    '17×24 = 17×20 + 4 = <code>344</code>',
    '17×24 ≈ 20×24 = <code>480</code>',
    '17×24 = 17×4×2 = <code>136</code>',
    '7×4=28, carry the 2 … = <code>418</code>'
  ];

  // Draw 4 model samples: k correct (1..3 so the RL rung never degenerates).
  function drawSamples(){
    var k = 1 + Math.floor(Math.random()*3);
    var picks = [], gi = shuffle(GOOD.slice()), bi = shuffle(BAD.slice());
    for (var i=0;i<4;i++) picks.push(i<k ? {txt:gi[i%gi.length], r:1} : {txt:bi[i%bi.length], r:0});
    return shuffle(picks);
  }
  function shuffle(a){ for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;} return a; }

  var samples = drawSamples();

  var RUNGS = [
    {
      id:"pre", no:"Rung 1", name:"Pretraining",
      who:"🌐 the internet", sub:"trillions of tokens, scraped",
      weight:"1", signed:false,
      delta:'The baseline. Every document humanity wrote enters the loss with the same constant weight <b>+1</b>. The model has no say in its own diet.',
      docs:function(){ return [
        {src:"common crawl · web page", txt:"The Treaty of Westphalia, signed in 1648, ended the Thirty Years' War…", chip:"w = +1", cls:"flat"},
        {src:"github · python file", txt:"<code>def quicksort(a): return a if len(a)<2 else …</code>", chip:"w = +1", cls:"flat"},
        {src:"forum · homework thread", txt:"you just multiply: 17 times 24 is 408, easy", chip:"w = +1", cls:"flat"}
      ];}
    },
    {
      id:"sft", no:"Rung 2", name:"SFT",
      who:"✍️ human labelers", sub:"a curated corpus — the internet you wish you had",
      weight:"1", signed:false,
      delta:'Only the <b>corpus</b> changed — small and curated instead of scraped. The loss, the gradient, and the constant weight <b>+1</b> are untouched. SFT is pretraining on better documents.',
      docs:function(){ return [
        {src:"labeler-written demonstration", txt:"Q: What is 17 × 24? &nbsp;A: 17×24 = 17×20 + 17×4 = 340 + 68 = <code>408</code>.", chip:"w = +1", cls:"flat"},
        {src:"labeler-written demonstration", txt:"Q: Summarize this article in two sentences. &nbsp;A: The study finds that…", chip:"w = +1", cls:"flat"}
      ];}
    },
    {
      id:"rft", no:"Rung 3", name:"Rejection sampling",
      who:"🤖 the model itself", sub:"…then a grader filters; only keepers are trained on",
      weight:"1 or drop", signed:false,
      delta:'Now <b>the model writes its own data</b> — sample several answers, keep the graded-correct ones, do ordinary SFT on the keepers. The weight is still +1; the grade only decides <b>membership</b>, not magnitude.',
      docs:function(){
        return samples.map(function(s){
          return s.r===1
            ? {src:"sampled from the model", txt:s.txt, grade:"✓ keep", gcls:"ok", chip:"w = +1", cls:"flat"}
            : {src:"sampled from the model", txt:s.txt, grade:"✗ wrong", gcls:"no", chip:"dropped", cls:"zero", dropped:true};
        });
      }
    },
    {
      id:"rl", no:"Rung 4", name:"RL · GRPO",
      who:"🤖 the model itself", sub:"…then a grader scores; every sample trains, weighted",
      weight:"A", signed:true,
      delta:'The final move: <b>stop throwing data away</b>. Every sample trains, and the grade becomes its <b>signed weight</b> — above the group average, learn it; below, a <b>negative</b> weight actively pushes that sequence\'s probability down.',
      docs:function(){
        var mean = samples.reduce(function(s,d){return s+d.r;},0)/samples.length;
        var sd = Math.sqrt(samples.reduce(function(s,d){return s+(d.r-mean)*(d.r-mean);},0)/samples.length) || 1;
        return samples.map(function(s){
          var a = (s.r-mean)/sd;
          return {src:"sampled from the model", txt:s.txt,
                  grade:(s.r===1?"✓ r=1":"✗ r=0"), gcls:(s.r===1?"ok":"no"),
                  chip:"w = "+(a>0?"+":"")+a.toFixed(2), cls:(a>=0?"pos":"neg")};
        });
      }
    }
  ];

  var cur = 0;
  var rungsEl = document.getElementById("rungs");
  var sourceEl = document.getElementById("source");
  var docsEl = document.getElementById("docs");
  var formulaEl = document.getElementById("formula");
  var deltaEl = document.getElementById("delta");
  var rerollBtn = document.getElementById("rerollBtn");

  RUNGS.forEach(function(r,i){
    var b = document.createElement("button");
    b.className = "rung"; b.innerHTML = '<span class="no">'+r.no+'</span>'+r.name;
    b.addEventListener("click", function(){ cur=i; render(); });
    rungsEl.appendChild(b);
  });

  function render(){
    var r = RUNGS[cur];
    [].forEach.call(rungsEl.children, function(b,i){ b.classList.toggle("on", i===cur); });
    rerollBtn.disabled = (cur < 2);

    sourceEl.innerHTML = '<span class="h">who writes the corpus</span>'+
      '<span class="who">'+r.who+'</span><span class="sub">'+r.sub+'</span>';
    // restart entry animation
    sourceEl.style.animation="none"; void sourceEl.offsetWidth; sourceEl.style.animation="";

    docsEl.innerHTML = "";
    r.docs().forEach(function(d,i){
      var el = document.createElement("div");
      el.className = "doc"+(d.dropped?" dropped":"");
      el.style.animationDelay = (i*70)+"ms";
      el.innerHTML =
        '<div class="txt"><span class="src">'+d.src+'</span>'+d.txt+'</div>'+
        (d.grade ? '<div class="grade '+d.gcls+'">'+d.grade+'</div>' : '')+
        '<div class="wchip '+d.cls+'">'+d.chip+'</div>';
      docsEl.appendChild(el);
    });

    formulaEl.innerHTML =
      '<span class="fixed">update&nbsp;=&nbsp;Σ<sub>docs</sub></span>'+
      '<span class="slot '+(r.signed?'signed':'flat')+'">'+(r.signed?'A(x, y)':'w = '+r.weight)+'</span>'+
      '<span class="fixed">·&nbsp;Σ<sub>t</sub>&nbsp;∇ log <span class="pi">π_θ</span>( y<sub>t</sub> ∣ y<sub>&lt;t</sub> )</span>';

    deltaEl.innerHTML = r.delta;
  }

  rerollBtn.addEventListener("click", function(){ samples = drawSamples(); render(); });
  render();
})();
</script>

<script>
  /* Report content height to the host page so the embedding iframe can resize. */
  (function(){
    function send(){
      var h = Math.max(
        document.documentElement.scrollHeight,
        document.body ? document.body.scrollHeight : 0
      );
      if (window.parent && window.parent !== window){
        window.parent.postMessage({ type:"blog-iframe-height", height:h }, "*");
      }
    }
    window.addEventListener("load", send);
    window.addEventListener("resize", send);
    if (window.ResizeObserver){
      try { new ResizeObserver(send).observe(document.documentElement); } catch(e){}
    }
    document.addEventListener("click", function(){ setTimeout(send, 450); });
    setTimeout(send, 120); setTimeout(send, 700); setTimeout(send, 1600);
  })();
</script>
</body>
</html>
